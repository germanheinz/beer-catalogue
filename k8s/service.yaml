apiVersion: v1
kind: Service
metadata:
  name: beer-catalogue-backend-svc
  namespace: default
spec:
  selector:
    app: beer-catalogue-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: beer-catalogue-frontend-svc
  namespace: default
spec:
  selector:
    app: beer-catalogue-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30080
  type: NodePort
